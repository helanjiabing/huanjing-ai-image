ding:20px;box-shadow:0 18px 55px rgba(55,30,80,.08)}.styles{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px}.style{border:1px solid var(--line);background:#faf9fc;border-radius:11px;padding:10px 5px;font-size:11px}.engine{display:flex;align-items:center;justify-content:space-between;background:#f7f4fb;border:1px solid #ebe5f2;border-radius:10px;padding:8px 10px;margin-bottom:18px;color:#736b79;font-size:10px}.engine b{color:#5f3dca}.engine i{width:7px;height:7px;border-radius:50%;background:#35bf82}.prompt-row{display:flex;justify-content:space-between}.prompt-row small{color:#aaa}textarea{width:100%;height:126px;border:1px solid var(--line);border-radius:13px;padding:13px;resize:none;outline:none;margin:10px 0}textarea:focus{border-color:var(--p);box-shadow:0 0 0 4px #eee8ff}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}.chips button{border:0;border-radius:99px;padding:6px 9px;font-size:10px;color:#6f6873}.generate{width:100%;height:46px;border:0;border-radius:12px;background:linear-gradient(135deg,#8055f3,#5b32d7);color:white;font-weight:700}.generate:disabled{opacity:.4}.note{text-align:center;color:#aaa;font-size:10px}.preview{height:610px;display:flex;align-items:center;justify-content:center;background:#faf8fc}.canvas{max-width:100%;height:100%;border-radius:15px;overflow:hidden;background:#eee9f4;display:grid;place-items:center;position:relative}.canvas.land{width:100%;height:auto}.canvas.square{height:min(100%,500px)}.canvas img{width:100%;height:100%;object-fit:cover}.empty{text-align:center;color:#8d8592;padding:28px}.empty strong{display:block;color:#3f3944;margin:12px}.actions{position:absolute;bottom:12px;display:flex;gap:7px}.actions button,.retry{border:0;border-radius:9px;padding:9px 12px;background:rgba(20,17,24,.75);color:#fff}.loading{position:absolute;inset:0;display:grid;place-items:center;text-align:center;padding:25px;background:#f0eafb;color:var(--p)}footer{border-top:1px solid #eee9f1;padding:24px <section><h2 class="section-title">精选示例</h2><div class="showcase"><div class="shot"><img src="examples/phone-moon.jpg" alt="月下雪山"><span>月下雪山</span></div><div class="shot"><img src="examples/phone-flower.jpg" alt="晨光雏菊"><span>晨光雏菊</span></div><div class="shot"><img src="examples/chat-cloud.jpg" alt="奶油云朵"><span>奶油云朵</span></div></div></section>
<h2 class="section-title">01 · 这张图准备用在哪里？</h2><div class="purposes" id="purposes"></div>
<div class="studio"><section class="panel"><h2 class="section-title">02 · 选择画面风格</h2><div class="styles" id="styles"></div><div class="engine"><span><i></i> 当前免费引擎：<b>Sana</b></span><span>智能排队 · 延迟重试</span></div><div class="prompt-row"><h2 class="section-title">03 · 描述画面</h2><small id="count">0 / 300</small></div><textarea id="prompt"></textarea><div class="chips" id="chips"></div><button class="generate" id="generate">✦ 开始生成</button><p class="note">已根据用途与风格预置提示词 · 可直接修改</p></section><section class="preview"><div class="canvas" id="canvas"><div class="empty"><div style="font-size:38px">✦</div><strong>你的作品将在这里出现</strong><small>选择风格，写下画面，然后开始创作</small></div></div></section></div><footer>Powered by free generative AI · 壁纸 · 聊天背景 · 桌面 · 头像</footer></div>
<script>
const P=[['phone','▯','手机壁纸','9:16',576,1023,'星空下的雪山与湖泊','vertical smartphone wallpaper, room for app icons'],['wechat','◌','聊天背景','9:16',576,1023,'浅色小雏菊散落图案','subtle chat background, low visual noise, soft sparse details'],['desktop','▰','电脑壁纸','16:9',1023,576,'暮色海岸与灯塔','widescreen desktop wallpaper, panoramic composition'],['avatar','◉','个性头像','1:1',768,768,'戴耳机的酷猫','profile avatar, centered close-up subject, clean background']];
const S=[['photo','📷 质感摄影','professional photography, realistic, refined lighting'],['anime','🌸 日系动漫','Japanese anime illustration, delicate linework'],['ill','🖌️ 治愈插画','cozy hand-painted illustration, soft colors'],['3d','🫧 梦幻 3D','dreamy 3D render, premium materials'],['cn','⛰️ 东方美学','modern Chinese aesthetics, poetic atmosphere'],['min','◻️ 极简设计','minimalist design, generous negative space']];
const Z=['真实自然的材质，专业摄影光线，细节清晰','日系动漫插画，细腻线条，明亮柔和的色彩','治愈系手绘插画，柔软笔触，温暖低饱和配色','梦幻3D渲染，圆润造型，高级材质与氛围光','现代东方美学，诗意留白，雅致含蓄的色彩','极简设计，干净构图，大面积留白，克制配色'];
let pi=0,si=0,attempt=0,url='',autoText=true;const $=s=>document.querySelector(s), prompt=$('#prompt'), canvas=$('#canvas');
function preset(force=false){if(force||autoText){prompt.value=`${P[pi][6]}，${Z[si]}，适合作为${P[pi][2]}，画面完整，无文字，无水印`;autoText=true;change(false)}}
function render(){ $('#purposes').innerHTML=P.map((x,i)=>`<button class="choice ${i===pi?'active':''}" data-i="${i}"><b>${x[1]} ${x[2]}</b><small>${x[3]} · 自动构图</small></button>`).join('');$('#styles').innerHTML=S.map((x,i)=>`<button class="style ${i===si?'active':''}" data-i="${i}">${x[1]}</button>`).join('');$('#chips').innerHTML=[P[pi][6],pi===3?'宇航员半身肖像':'清晨的白色雏菊','雨夜霓虹城市'].map(x=>`<button>${x}</button>`).join('');document.querySelectorAll('.choice').forEach(b=>b.onclick=()=>{pi=+b.dataset.i;render();preset(true);reset()});document.querySelectorAll('.style').forEach(b=>b.onclick=()=>{si=+b.dataset.i;render();preset(true)});document.querySelectorAll('.chips button').forEach(b=>b.onclick=()=>{prompt.value=b.textContent;autoText=false;change(false)})}
function reset(){canvas.className='canvas';canvas.innerHTML='<div class="empty"><div style="font-size:38px">✦</div><strong>你的作品将在这里出现</strong><small>写下画面，然后开始创作</small></div>'}
function change(user=true){if(user)autoText=false;prompt.value=prompt.value.slice(0,300);$('#count').textContent=prompt.value.length+' / 300';$('#generate').disabled=prompt.value.trim().length<3}prompt.oninput=()=>change(true);
function generate(){attempt=0;load()}function load(){const p=P[pi],s=S[si],seed=(Date.now()+attempt*7919)%999999;url=`https://image.pollinations.ai/prompt/${encodeURIComponent(prompt.value+'. '+p[7]+'. '+s[2]+'. masterpiece, high detail, no text, no watermark')}?model=sana&width=${p[4]}&height=${p[5]}&seed=${seed}&nologo=true`;canvas.className='canvas '+(pi===2?'land':pi===3?'square':'');canvas.innerHTML=`<img src="${url}" alt="AI生成图片"><div class="loading">${attempt?'正在重新排队，第 '+attempt+'/3 次…':'AI 正在创作…'}<br><small>免费线路通常需要 10–40 秒</small></div>`;const img=canvas.querySelector('img');img.onload=()=>{canvas.querySelector('.loading')?.remove();const a=document.createElement('div');a.className='actions';a.innerHTML='<button>↗ 查看原图</button><button>↻ 换一张</button>';a.children[0].onclick=()=>open(url,'_blank');a.children[1].onclick=generate;canvas.append(a)};img.onerror=()=>{if(attempt<3){const waits=[5000,10000,18000],box=canvas.querySelector('.loading');box.innerHTML=`免费线路正在排队<br><small>${waits[attempt]/1000} 秒后自动重试，请不要关闭页面</small>`;setTimeout(()=>{attempt++;load()},waits[attempt])}else{canvas.innerHTML='<div class="empty"><strong>免费线路当前排队人数过多</strong><small>建议等待一分钟后再试</small><br><button class="retry">重新生成</button></div>';canvas.querySelector('.retry').onclick=generate}}}
$('#generate').onclick=generate;render();preset(true);
</script></body></html>
